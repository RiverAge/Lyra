# Apple Music 制作人员角色映射表
# ================================
# 维护方式：遇到 "缺失角色: xxx" 时，在对应分类下追加一个 [[role]] 块。
# target_tag 留空 ("") = 不归到 navidrome 标准标签（仅进 performer 聚合）。
# display = 英文显示名，写入 m4a 的 performer 聚合串。
#
# 补全原则（重要）：
#   多语言对应关系必须来自实爬对照（同一首歌多区域返回同一人），
#   不得凭语言知识直译片假名/韩文。target_tag 归类需人/agent 判断。
#   每个 [[role]] 块上方的 `# 实爬对照:` 简注记录对照人名+song_id，
#   完整跨区证据（各区域原始 roleName 表 + target_tag 判断依据）见
#   docs/role_map-evidence.md。每次补 key 时在该文档追加一节。
#   修改本文件无需重启程序：get_role_map() 按 mtime 惰性重读，改完即生效。
#
# 格式：
#   [[role]]
#   key = "Bass"          # roleName（英文区/中文区/日文区/韩文区各自一个 key）
#   display = "Bass"
#   target_tag = ""       # 空=None；可选值见 src/credits.py 的 ITUNES_CREDIT_TAGS
#                         # (composer/lyricist/producer/mixer/engineer/remixer/
#                         #  arranger/conductor/djmixer/performer)
# --- 英文 roleName（英文区域 MY/US/GB 等返回的 roleNames 为英文）---
# 对应中文键已存在，此处补充英文键以覆盖英文区域歌曲。
# 修改时务必与 tools/am_credits_update.py 的说明保持一致（见下方同步规则）。
